<style>
    .card {
        width: 300px;
        border-radius: 12px;
        overflow: hidden;
        background: #d5f7ff;
        font-family: Arial, sans-serif;
        margin: 20px;
        border: solid 2px black;
        transition: transform 0.3s ease;
    }

    .card img {
        width: 100%;
        height: 160px;
        object-fit: cover;
    }

    .card-content {
        padding: 12px;
    }

    .source {
        font-size: 12px;
        color: #888;
    }

    .card h3 {
        font-size: 16px;
        margin: 6px 0;
        color: #222;
    }

    .card-footer {
        display: flex;
        gap: 12px;
        font-size: 14px;
        color: #666;
    }

    .principal {
        display: flex;
        justify-content: center;
        gap: 20px;
        padding: 20px;
        background-color: aqua;
        border-radius: 10px;
        flex-wrap: wrap;
        width: 70%;
        margin: 0 auto;
    }

    .card:hover {
        transform: translateY(-8px);
        background-color: rgb(255, 255, 255);
        box-shadow: 0 15px 30px rgba(0, 0, 0, 0.25);
    }
</style>
