<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            box-sizing: border-box;
        }
        button{
            background-color: blue;
            color:blanchedalmond;
            font-size: 18px;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        .botao{
            padding-left: 20px;
            padding-right: 20px;
            padding-top: 10px;
            padding-bottom: 10px;
            border: dashed 2px red;
            color:blue;
            background-color: aquamarine;
        }
        .input{
            padding: 10px;
            border: 0px;
            border-bottom: solid 1px black;
            border-right: solid 1px black;
            margin: 10px

        }
        #cadastro{
            background-color: white;
            width: 300px;


        }
    </style>
</head>

    <button style="background-color: rgb(85, 4, 4);">
        cancelar

</html>
